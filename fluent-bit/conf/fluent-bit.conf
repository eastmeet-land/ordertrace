[SERVICE]
    Log_Level    info
    Daemon       Off
    Refresh_Interval    1
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Flush        1
    Grace        5

[INPUT]
    Name        tcp
    Tag         java.all
    Listen      0.0.0.0
    Port        24224
    Format      json
    Chunk_Size  64
    Buffer_Size 128

[FILTER]
    Name    modify
    Match   java.all
    Add     source tcp
    Add     collector fluent-bit

[FILTER]
    Name    lua
    Match   java.all
    code    function build_index_name(tag, timestamp, record) local application = record["application"] or "unknown-default"; local app_name, environment = string.match(application, "^([^%-]+)%-(.+)$"); if not app_name then app_name = application; environment = "default"; end; local log_type = record["log_type"] or "unknown"; local type_map = { application = "app", sql_query = "sql", error = "error" }; local type_prefix = type_map[log_type] or "unknown"; record["es_index"] = app_name .. "-" .. environment .. "-" .. type_prefix; record["app"] = app_name; record["env"] = environment; return 1, timestamp, record; end
    call    build_index_name

[FILTER]
    Name    modify
    Match   java.all
    Condition Key_value_matches level ^ERROR$
    Add     priority critical
    Add     alert_required true

[FILTER]
    Name    modify
    Match   java.all
    Condition Key_value_matches log_type ^sql_query$
    Add     log_category sql

[FILTER]
    Name    modify
    Match   java.all
    Condition Key_value_matches log_type ^application$
    Add     log_category application

[FILTER]
    Name    modify
    Match   java.all
    Condition Key_value_matches log_type ^error$
    Add     log_category error
    Add     priority critical
    Add     alert_required true

[OUTPUT]
    Name es
    Match java.all
    Host elasticsearch
    Port 9200
    Logstash_Format On
    Logstash_Prefix_Key es_index
    Logstash_DateFormat %Y.%m.%d
    suppress_type_name On
    include_tag_key On
    Generate_ID On
    Buffer_Size 1MB
    Retry_Limit 5
    Workers 2

[OUTPUT]
    Name  stdout
    Match java.all
    Format json_lines
